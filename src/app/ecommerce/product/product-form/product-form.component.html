<div class="modal-header">
  <h4 class="modal-title" id="modal-basic-title">{{ product ? 'Edit Product' : 'Add New Product' }}</h4>
  <button type="button" class="btn-close" aria-label="Close" (click)="activeModal.dismiss()"></button>
</div>
<div class="modal-body">
  <form [formGroup]="productForm" (ngSubmit)="onSubmit()">
    <div class="row">
      <div class="col-md-6 mb-3">
        <label for="productName" class="form-label">Product Name *</label>
        <input type="text" class="form-control" id="productName" formControlName="productName" [ngClass]="{'is-invalid': productForm.get('productName')?.invalid && productForm.get('productName')?.touched}">
        <div class="invalid-feedback">Product Name is required.</div>
      </div>
      <div class="col-md-3 mb-3">
        <label for="price" class="form-label">Price *</label>
        <input type="number" class="form-control" id="price" formControlName="price" [ngClass]="{'is-invalid': productForm.get('price')?.invalid && productForm.get('price')?.touched}">
      </div>
      <div class="col-md-3 mb-3">
        <label for="discountPrice" class="form-label">Discount Price</label>
        <input type="number" class="form-control" id="discountPrice" formControlName="discountPrice">
      </div>
    </div>

    <div class="row">
      <div class="col-md-6 mb-3">
        <label for="categoryId" class="form-label">Category *</label>
        <select class="form-select" id="categoryId" formControlName="categoryId" (change)="onCategoryChange()" [ngClass]="{'is-invalid': productForm.get('categoryId')?.invalid && productForm.get('categoryId')?.touched}">
          <option value="">Select Category</option>
          <option *ngFor="let cat of categories" [value]="cat._id">{{ cat.name }}</option>
        </select>
      </div>
      <div class="col-md-6 mb-3">
        <label for="subcategoryId" class="form-label">Subcategory</label>
        <select class="form-select" id="subcategoryId" formControlName="subcategoryId">
          <option value="">Select Subcategory</option>
          <option *ngFor="let sub of subcategories" [value]="sub._id">{{ sub.name }}</option>
        </select>
      </div>
    </div>

    <div class="row">
      <div class="col-md-4 mb-3">
        <label for="brand" class="form-label">Brand</label>
        <input type="text" class="form-control" id="brand" formControlName="brand">
      </div>
      <div class="col-md-4 mb-3">
        <label for="status" class="form-label">Status</label>
        <select class="form-select" id="status" formControlName="status">
          <option value="ACTIVE">ACTIVE</option>
          <option value="DRAFT">DRAFT</option>
          <option value="INACTIVE">INACTIVE</option>
        </select>
      </div>
      <div class="col-md-4 mb-3 d-flex align-items-end pb-2">
        <div class="form-check form-switch">
          <input class="form-check-input" type="checkbox" id="recommended" formControlName="recommended">
          <label class="form-check-label" for="recommended">Recommended Product</label>
        </div>
      </div>
    </div>

    <div class="mb-3">
      <label for="shortDescription" class="form-label">Short Description</label>
      <textarea class="form-control" id="shortDescription" formControlName="shortDescription" rows="2"></textarea>
    </div>

    <div class="mb-3">
      <label class="form-label">Images</label>
      <input type="file" class="form-control" (change)="onFileSelected($event)" multiple accept="image/*">
      
      <div class="mt-3 d-flex flex-wrap gap-2" *ngIf="existingImages.length > 0">
        <div *ngFor="let img of existingImages; let i = index" class="position-relative d-inline-block">
          <img [src]="getImageUrl(img)" class="rounded border" style="width: 80px; height: 80px; object-fit: cover;">
          <button type="button" class="btn btn-danger btn-sm position-absolute top-0 end-0 rounded-circle" style="transform: translate(30%, -30%); padding: 0.1rem 0.3rem;" (click)="removeExistingImage(i)">
            <i-feather name="x" class="feather-sm"></i-feather>
          </button>
        </div>
      </div>
    </div>

  </form>
</div>
<div class="modal-footer">
  <button type="button" class="btn btn-outline-secondary" (click)="activeModal.dismiss()">Cancel</button>
  <button type="button" class="btn btn-primary" [disabled]="productForm.invalid || isSubmitting" (click)="onSubmit()">
    <span *ngIf="isSubmitting" class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
    {{ product ? 'Update' : 'Save' }} Product
  </button>
</div>
